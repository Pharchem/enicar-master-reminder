name: Daily Reminder Emails

# Runs every morning ~07:00 IST. GitHub cron is UTC; 07:00 IST = 01:30 UTC.
on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:      # allow manual runs (still respects DRY_RUN)
    inputs:
      dry_run:
        description: "Set to false to actually send emails"
        required: false
        default: "true"

concurrency:
  group: daily-reminders   # never overlap runs
  cancel-in-progress: false

permissions:
  contents: write          # to commit the updated sent-log

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run reminder engine
        env:
          # LIVE since 2026-07-19 (director sign-off after pre-flight). Scheduled runs
          # send for real; a manual run can still pass dry_run=true to test safely.
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_APP_PASSWORD: ${{ secrets.MAIL_APP_PASSWORD }}
        run: python engine/reminder_engine.py

      - name: Commit sent-log and dry-run logs (idempotency record)
        run: |
          git config user.name  "enicar-reminder-bot"
          git config user.email "info@pharchem.in"
          git add sent-log/ data/dry-run-logs/ || true
          if ! git diff --cached --quiet; then
            git commit -m "reminder run $(date -u +%Y-%m-%d): update sent-log"
            git push
          else
            echo "No sent-log changes to commit."
          fi
